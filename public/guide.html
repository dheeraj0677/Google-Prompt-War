<!DOCTYPE html>
<html lang="en">
<head>
  <script src="js/config.js"></script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Registration Guide — ElectBot</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/material.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=${typeof CONFIG !== 'undefined' ? CONFIG.GA4_MEASUREMENT_ID : 'G-XXXXXXXXXX'}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    if (typeof CONFIG !== 'undefined' && CONFIG.GA4_MEASUREMENT_ID && CONFIG.GA4_MEASUREMENT_ID !== 'G-XXXXXXXXXX') {
      gtag('config', CONFIG.GA4_MEASUREMENT_ID);
    }
  </script>
</head>
<body>
  <div class="bg-gradient"></div><canvas id="particleCanvas"></canvas><div class="topo-overlay"></div>
  <nav class="navbar" id="navbar"><a href="index.html" class="nav-brand"><span class="material-symbols-outlined">how_to_vote</span>ElectBot</a><button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span class="material-symbols-outlined">menu</span></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="chat.html">AI Chat</a></li><li><a href="timeline.html">Timeline</a></li><li><a href="guide.html" class="active">Voter Guide</a></li><li><a href="quiz.html">Quiz</a></li><li><a href="news.html">News</a></li><li><a href="map.html">Find Polls</a></li><li><a href="plan.html">My Plan</a></li></ul><button class="theme-toggle" id="themeToggle" aria-label="Theme"><span class="material-symbols-outlined">auto_awesome</span></button></nav>
  <main class="page-content">
    <div class="container" style="max-width:800px">
      <div style="text-align:center;margin-bottom:var(--space-2xl)">
        <div class="hero-badge"><span class="material-symbols-outlined" style="font-size:16px">checklist</span>Interactive Guide</div>
        <h1 style="margin-top:var(--space-md)">Voter Registration <span class="text-gradient">Guide</span></h1>
        <p style="margin:var(--space-md) auto 0">Complete each step to ensure you're ready to vote.</p>
      </div>
      <div class="guide-progress"><div class="guide-progress-text"><span id="progressLabel">0 of 5 steps completed</span><span id="progressPercent">0%</span></div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>
      <div class="guide-steps" id="guideSteps"></div>
    </div>
  </main>
  <footer class="footer"><div class="container"><div class="footer-bottom"><p>ElectBot &copy; 2025</p></div></div></footer>
  <script src="js/animations.js"></script>
  <script>
    const steps=[
      {title:'Check Your Eligibility',icon:'verified_user',content:`<h4 style="margin-bottom:var(--space-md)">Are you eligible to vote?</h4><div style="display:flex;flex-direction:column;gap:var(--space-sm)"><label class="quiz-option" style="cursor:pointer"><input type="checkbox" class="elig-check" style="accent-color:var(--gold);width:18px;height:18px">I am a citizen of India</label><label class="quiz-option" style="cursor:pointer"><input type="checkbox" class="elig-check" style="accent-color:var(--gold);width:18px;height:18px">I am 18 years or older</label><label class="quiz-option" style="cursor:pointer"><input type="checkbox" class="elig-check" style="accent-color:var(--gold);width:18px;height:18px">I am a resident of my constituency</label><label class="quiz-option" style="cursor:pointer"><input type="checkbox" class="elig-check" style="accent-color:var(--gold);width:18px;height:18px">I am not disqualified under any law</label></div><div id="elig-result" style="margin-top:var(--space-md);padding:var(--space-md);border-radius:var(--radius-md);display:none"></div><a href="chat.html" class="btn btn-tonal" style="margin-top:var(--space-md);font-size:.8125rem"><span class="material-symbols-outlined" style="font-size:16px">smart_toy</span>Ask ElectBot</a>`},
      {title:'Gather Required Documents',icon:'folder_open',content:`<h4 style="margin-bottom:var(--space-md)">Documents you'll need:</h4><div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)"><div class="card" style="padding:var(--space-md)"><strong style="color:var(--gold);font-size:.8125rem">PROOF OF AGE</strong><ul style="margin-top:8px;padding-left:20px;font-size:.875rem;color:var(--text-secondary);line-height:1.8"><li>Birth Certificate</li><li>Class 10 Marksheet</li><li>Aadhaar Card</li><li>Passport</li></ul></div><div class="card" style="padding:var(--space-md)"><strong style="color:var(--mint);font-size:.8125rem">PROOF OF ADDRESS</strong><ul style="margin-top:8px;padding-left:20px;font-size:.875rem;color:var(--text-secondary);line-height:1.8"><li>Aadhaar Card</li><li>Utility Bill</li><li>Bank Passbook</li><li>Ration Card</li></ul></div></div><p style="margin-top:var(--space-md);font-size:.8125rem;color:var(--text-tertiary)">📸 You'll also need a passport-size photograph.</p>`},
      {title:'Register to Vote',icon:'app_registration',content:`<h4 style="margin-bottom:var(--space-md)">Choose your registration method:</h4><div style="display:flex;flex-direction:column;gap:var(--space-sm)"><div class="card" style="padding:var(--space-lg);display:flex;align-items:flex-start;gap:var(--space-md)"><span class="material-symbols-outlined" style="color:var(--gold);font-size:32px">computer</span><div><strong>Online (Recommended)</strong><p style="font-size:.8125rem;margin:4px 0">Visit <a href="https://nvsp.in" target="_blank">nvsp.in</a> or use the Voter Helpline App.</p></div></div><div class="card" style="padding:var(--space-lg);display:flex;align-items:flex-start;gap:var(--space-md)"><span class="material-symbols-outlined" style="color:var(--blue);font-size:32px">mail</span><div><strong>By Post</strong><p style="font-size:.8125rem;margin:4px 0">Download Form 6 from eci.gov.in and mail to your ERO.</p></div></div><div class="card" style="padding:var(--space-lg);display:flex;align-items:flex-start;gap:var(--space-md)"><span class="material-symbols-outlined" style="color:var(--mint);font-size:32px">location_on</span><div><strong>In Person</strong><p style="font-size:.8125rem;margin:4px 0">Visit your nearest Electoral Registration Office or CSC.</p></div></div></div>`},
      {title:'Check Registration Status',icon:'search',content:`<div class="card" style="padding:var(--space-xl);text-align:center"><span class="material-symbols-outlined" style="font-size:48px;color:var(--gold);margin-bottom:var(--space-md)">fact_check</span><p style="margin-bottom:var(--space-lg)">Verify your voter registration on the official portal</p><a href="https://electoralsearch.eci.gov.in/" target="_blank" class="btn btn-primary"><span class="material-symbols-outlined">open_in_new</span>Check on NVSP</a></div>`},
      {title:'Prepare for Election Day',icon:'event_available',content:`<h4 style="margin-bottom:var(--space-md)">Your Election Day Checklist:</h4><div style="display:flex;flex-direction:column;gap:var(--space-sm)"><label class="quiz-option" style="cursor:pointer"><input type="checkbox" style="accent-color:var(--mint);width:18px;height:18px">I know my polling station location</label><label class="quiz-option" style="cursor:pointer"><input type="checkbox" style="accent-color:var(--mint);width:18px;height:18px">I have my Voter ID ready</label><label class="quiz-option" style="cursor:pointer"><input type="checkbox" style="accent-color:var(--mint);width:18px;height:18px">I know the voting hours</label><label class="quiz-option" style="cursor:pointer"><input type="checkbox" style="accent-color:var(--mint);width:18px;height:18px">I understand EVM and VVPAT</label></div><a href="plan.html" class="btn btn-primary" style="margin-top:var(--space-lg)"><span class="material-symbols-outlined">edit_note</span>Create My Voting Plan</a>`}
    ];
    const stepsContainer=document.getElementById('guideSteps');
    const completedSteps=JSON.parse(localStorage.getItem('guide-completed')||'[]');
    steps.forEach((s,i)=>{const done=completedSteps.includes(i);const el=document.createElement('div');el.className=`guide-step ${done?'completed':''} ${i===0&&!done?'active':''}`;el.id=`step-${i}`;el.innerHTML=`<button class="guide-step-header" onclick="toggleStep(${i})"><div class="step-number">${done?'<span class="material-symbols-outlined" style="font-size:18px">check</span>':i+1}</div><div style="flex:1"><strong style="font-size:1rem">${s.title}</strong></div><span class="material-symbols-outlined" style="font-size:20px;color:var(--text-tertiary)" id="chev-${i}">${i===0?'expand_less':'expand_more'}</span></button><div class="guide-step-body">${s.content}${!done?`<button class="btn btn-primary" style="margin-top:var(--space-xl)" onclick="completeStep(${i})"><span class="material-symbols-outlined">check</span>Mark Complete</button>`:'<div style="display:flex;align-items:center;gap:8px;margin-top:var(--space-lg);color:var(--mint);font-weight:600"><span class="material-symbols-outlined">check_circle</span>Completed!</div>'}</div>`;stepsContainer.appendChild(el);});
    updateProgress();
    setTimeout(()=>{document.querySelectorAll('.elig-check').forEach(cb=>{cb.addEventListener('change',()=>{const all=[...document.querySelectorAll('.elig-check')].every(c=>c.checked);const r=document.getElementById('elig-result');if(all){r.style.display='block';r.style.background='rgba(0,245,160,0.1)';r.style.border='1px solid var(--mint)';r.style.color='var(--mint)';r.innerHTML='<strong>✅ You are eligible to vote!</strong>';}});});},100);
    function toggleStep(i){const s=document.getElementById(`step-${i}`);const was=s.classList.contains('active');document.querySelectorAll('.guide-step').forEach((x,j)=>{x.classList.remove('active');document.getElementById(`chev-${j}`).textContent='expand_more';});if(!was){s.classList.add('active');document.getElementById(`chev-${i}`).textContent='expand_less';}}
    function completeStep(i){if(!completedSteps.includes(i))completedSteps.push(i);localStorage.setItem('guide-completed',JSON.stringify(completedSteps));const s=document.getElementById(`step-${i}`);s.classList.add('completed');s.classList.remove('active');s.querySelector('.step-number').innerHTML='<span class="material-symbols-outlined" style="font-size:18px">check</span>';if(i<steps.length-1){document.getElementById(`step-${i+1}`).classList.add('active');document.getElementById(`chev-${i+1}`).textContent='expand_less';document.getElementById(`step-${i+1}`).scrollIntoView({behavior:'smooth',block:'center'});}updateProgress();}
    function updateProgress(){const c=completedSteps.length,t=steps.length,p=Math.round(c/t*100);document.getElementById('progressLabel').textContent=`${c} of ${t} steps completed`;document.getElementById('progressPercent').textContent=`${p}%`;document.getElementById('progressFill').style.width=`${p}%`;}
  </script>
</body>
</html>
