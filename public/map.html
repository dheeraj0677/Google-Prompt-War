<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Polling Stations — ElectBot</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/material.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/config.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=${CONFIG.GA4_MEASUREMENT_ID}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    if (typeof CONFIG !== "undefined" && CONFIG.GA4_MEASUREMENT_ID && CONFIG.GA4_MEASUREMENT_ID !== "G-XXXXXXXXXX") {
      gtag("config", CONFIG.GA4_MEASUREMENT_ID);
    }
  </script>
</head>
<body>
  <div class="bg-gradient"></div>
  <nav class="navbar" id="navbar"><a href="index.html" class="nav-brand"><span class="material-symbols-outlined">how_to_vote</span>ElectBot</a><button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span class="material-symbols-outlined">menu</span></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="chat.html">AI Chat</a></li><li><a href="timeline.html">Timeline</a></li><li><a href="guide.html">Voter Guide</a></li><li><a href="quiz.html">Quiz</a></li><li><a href="news.html">News</a></li><li><a href="map.html" class="active">Find Polls</a></li><li><a href="plan.html">My Plan</a></li></ul><button class="theme-toggle" id="themeToggle" aria-label="Theme"><span class="material-symbols-outlined">auto_awesome</span></button></nav>
  <div class="map-layout">
    <div class="map-sidebar">
      <h2 style="font-size:1.25rem;margin-bottom:var(--space-sm);color:var(--gold)">Polling Stations</h2>
      <p style="font-size:.8125rem;color:var(--text-tertiary);margin-bottom:var(--space-lg)">Find your nearest polling station</p>
      <div style="display:flex;gap:var(--space-xs);flex-wrap:wrap;margin-bottom:var(--space-lg)">
        <button class="chip active" onclick="filterSt('all',this)">All</button>
        <button class="chip" onclick="filterSt('election_day',this)">Election Day</button>
        <button class="chip" onclick="filterSt('early',this)">Early Voting</button>
        <button class="chip" onclick="filterSt('accessible',this)">♿ Accessible</button>
      </div>
      <input type="text" class="input-field" placeholder="Search by area..." style="margin-bottom:var(--space-md)" oninput="searchSt(this.value)">
      <div id="stationList"></div>
      <div style="margin-top:var(--space-lg);padding:var(--space-md);background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.2);border-radius:var(--radius-md)"><p style="font-size:.75rem;color:var(--text-secondary);margin:0"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">info</span> Sample data for demonstration.</p></div>
    </div>
    <div id="map" class="map-container" style="background:var(--bg-mid);display:flex;align-items:center;justify-content:center;z-index:1">
      <!-- Leaflet map will render here -->
    </div>
  </div>
  <script src="js/animations.js"></script>
  <script>
    const stations=[
      {name:"Govt. Senior Secondary School",area:"Connaught Place",address:"Barakhamba Rd, New Delhi, 110001",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:28.6315,lng:77.2167},
      {name:"Community Hall, Sector 15",area:"Dwarka",address:"Sector 15, Dwarka, New Delhi, 110078",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:28.5921,lng:77.046},
      {name:"Municipal Corporation Office",area:"Karol Bagh",address:"Ajmal Khan Rd, 110005",hours:"8:00 AM – 5:00 PM",type:"early",accessible:false,lat:28.6519,lng:77.1905},
      {name:"Kendriya Vidyalaya",area:"Laxmi Nagar",address:"Vikas Marg, 110092",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:28.6312,lng:77.2789},
      {name:"Tehsil Office",area:"Rohini",address:"Sector 11, Rohini, 110085",hours:"8:00 AM – 5:00 PM",type:"early",accessible:true,lat:28.7326,lng:77.1108},
      {name:"Govt. Girls School",area:"Saket",address:"Press Enclave Marg, 110017",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:false,lat:28.5244,lng:77.2067},
      {name:"Community Centre",area:"Janakpuri",address:"C-Block, Janakpuri, 110058",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:28.6219,lng:77.0842}
    ];
    let cf='all';
    function renderSt(l){const c=document.getElementById('stationList');if(!l.length){c.innerHTML='<p style="text-align:center;color:var(--text-tertiary);padding:var(--space-xl)">No stations found.</p>';return;}c.innerHTML=l.map((s,i)=>`<div class="station-card" onclick="document.querySelectorAll('.station-card').forEach(c=>c.style.borderColor='');this.style.borderColor='var(--gold)'"><div style="display:flex;align-items:flex-start;gap:var(--space-sm)"><span class="material-symbols-outlined" style="color:var(--gold);font-size:20px;margin-top:2px">location_on</span><div style="flex:1"><strong style="font-size:.875rem">${s.name}</strong><p style="font-size:.75rem;color:var(--text-tertiary);margin:2px 0">${s.address}</p><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"><span class="chip" style="padding:2px 8px;font-size:.625rem">${s.type==='early'?'🟢 Early':'🔵 Election Day'}</span>${s.accessible?'<span class="chip" style="padding:2px 8px;font-size:.625rem">♿ Accessible</span>':''}<span class="chip" style="padding:2px 8px;font-size:.625rem">🕐 ${s.hours}</span></div></div></div><a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" rel="noopener" class="btn btn-tonal" style="margin-top:var(--space-sm);width:100%;justify-content:center;padding:8px;font-size:.75rem" onclick="event.stopPropagation()"><span class="material-symbols-outlined" style="font-size:14px">directions</span>Get Directions</a></div>`).join('');}
    function filterSt(t,b){document.querySelectorAll('.map-sidebar .chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');cf=t;const filtered = t==='all'?stations:t==='accessible'?stations.filter(s=>s.accessible):stations.filter(s=>s.type===t);renderSt(filtered);updateMarkers(filtered);}
    function searchSt(q){const l=q.toLowerCase();const filtered = stations.filter(s=>(cf==='all'||s.type===cf||(cf==='accessible'&&s.accessible))&&(s.name.toLowerCase().includes(l)||s.area.toLowerCase().includes(l)));renderSt(filtered);updateMarkers(filtered);}
    renderSt(stations);

    // Leaflet Maps Integration (Free Alternative)
    let map;
    let markersLayer;

    function initMap() {
      map = L.map('map').setView([28.6139, 77.2090], 11);

      // Use CARTO Voyager tiles (clean, light map style)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
      updateMarkers(stations);
    }

    function updateMarkers(filteredStations) {
      if (!markersLayer) return;
      markersLayer.clearLayers();
      
      filteredStations.forEach(s => {
        const color = s.type === 'early' ? '#4ade80' : '#4a9eff';
        const markerHtml = `<div style="background-color: ${color}; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.4);"></div>`;
        const icon = L.divIcon({
          html: markerHtml,
          className: 'custom-leaflet-marker',
          iconSize: [20, 20],
          iconAnchor: [10, 10]
        });

        const marker = L.marker([s.lat, s.lng], { icon: icon });
        marker.bindPopup(`<div style="color:#333;padding:5px;font-family:var(--font-sans)"><strong>${s.name}</strong><p style="margin:5px 0 0;font-size:12px">${s.address}</p></div>`);
        markersLayer.addLayer(marker);
      });
    }

    document.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
