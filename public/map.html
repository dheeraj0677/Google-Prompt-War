<!DOCTYPE html>
<html lang="en">
<head>
  <script src="js/config.js"></script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Polling Stations — ElectBot</title>
  <meta name="description" content="Find and locate your nearest polling station across India with interactive map visualization.">
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/material.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
  <style>
    .custom-cluster {
      background: var(--gold);
      border: 4px solid rgba(255, 215, 0, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=${typeof CONFIG !== 'undefined' ? CONFIG.GA4_MEASUREMENT_ID : ''}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    if (typeof CONFIG !== "undefined" && CONFIG.GA4_MEASUREMENT_ID && CONFIG.GA4_MEASUREMENT_ID !== "G-XXXXXXXXXX") {
      gtag("config", CONFIG.GA4_MEASUREMENT_ID);
    }
  </script>
</head>
<body>
  <div class="bg-gradient"></div><canvas id="particleCanvas" aria-hidden="true"></canvas><div class="topo-overlay" aria-hidden="true"></div>
  <nav class="navbar" id="navbar"><a href="index.html" class="nav-brand" aria-label="ElectBot Home"><span class="material-symbols-outlined" aria-hidden="true">how_to_vote</span>ElectBot</a><button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span class="material-symbols-outlined">menu</span></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="chat.html">AI Chat</a></li><li><a href="timeline.html">Timeline</a></li><li><a href="guide.html">Voter Guide</a></li><li><a href="quiz.html">Quiz</a></li><li><a href="news.html">News</a></li><li><a href="map.html" class="active">Find Polls</a></li><li><a href="plan.html">My Plan</a></li></ul><button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="material-symbols-outlined" aria-hidden="true">auto_awesome</span></button></nav>
  <div class="map-layout">
    <div class="map-sidebar">
      <div style="margin-bottom:var(--space-lg)">
        <h2 style="color:var(--gold)">Polling <span class="text-gradient">Stations</span></h2>
        <p style="font-size:.8125rem;color:var(--text-tertiary);margin-top:4px">Locate your nearest station across all of India.</p>
      </div>
      <div style="display:flex;gap:var(--space-xs);flex-wrap:wrap;margin-bottom:var(--space-lg)">
        <button class="chip active" onclick="filterSt('all',this)">All</button>
        <button class="chip" onclick="filterSt('election_day',this)">Election Day</button>
        <button class="chip" onclick="filterSt('early',this)">Early Voting</button>
        <button class="chip" onclick="filterSt('accessible',this)">♿ Accessible</button>
      </div>
      <input type="text" class="input-field" placeholder="Search by area..." aria-label="Search polling stations by area" style="margin-bottom:var(--space-md)" oninput="searchSt(this.value)">
      <div id="stationList"></div>
      <div style="margin-top:var(--space-lg);padding:var(--space-md);background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.2);border-radius:var(--radius-md)">
        <p style="font-size:.75rem;color:var(--text-secondary);margin:0">
          <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">info</span> 
          Visualizing 200,000+ stations across every city and town.
        </p>
      </div>
    </div>
    <div id="map" class="map-container" role="application" aria-label="Interactive polling station map" style="background:var(--bg-mid);z-index:1"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/stations-data.js"></script>
  <script>
    const stations=[
      {name:"Town Hall Polling Center",area:"Mumbai",address:"Fort, Mumbai, Maharashtra 400001",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:18.9322,lng:72.8264},
      {name:"Govt. Senior Secondary School",area:"New Delhi",address:"Barakhamba Rd, New Delhi 110001",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:28.6315,lng:77.2167},
      {name:"Central Library Polling Station",area:"Bengaluru",address:"Cubbon Park, Bengaluru, Karnataka 560001",hours:"8:00 AM – 5:00 PM",type:"early",accessible:true,lat:12.9763,lng:77.5929},
      {name:"Municipal Corporation Office",area:"Chennai",address:"Ripon Building, Chennai, Tamil Nadu 600003",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:false,lat:13.0827,lng:80.2707},
      {name:"Kendriya Vidyalaya",area:"Kolkata",address:"Ballygunge, Kolkata, West Bengal 700019",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:22.5280,lng:88.3659},
      {name:"Tehsil Office",area:"Ahmedabad",address:"Navrangpura, Ahmedabad, Gujarat 380009",hours:"8:00 AM – 5:00 PM",type:"early",accessible:true,lat:23.0338,lng:72.5466},
      {name:"Govt. Girls School",area:"Hyderabad",address:"Banjara Hills, Hyderabad, Telangana 500034",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:false,lat:17.4156,lng:78.4347},
      {name:"Community Centre",area:"Pune",address:"Shivajinagar, Pune, Maharashtra 411005",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:18.5308,lng:73.8475},
      {name:"Public Public School",area:"Jaipur",address:"Malviya Nagar, Jaipur, Rajasthan 302017",hours:"7:00 AM – 6:00 PM",type:"election_day",accessible:true,lat:26.8530,lng:75.8047},
      {name:"Panchayat Bhavan",area:"Lucknow",address:"Hazratganj, Lucknow, Uttar Pradesh 226001",hours:"8:00 AM – 5:00 PM",type:"early",accessible:true,lat:26.8467,lng:80.9462}
    ];
    let cf='all';
    function renderSt(l){const c=document.getElementById('stationList');if(!l.length){c.innerHTML='<p style="text-align:center;color:var(--text-tertiary);padding:var(--space-xl)">No stations found.</p>';return;}c.innerHTML=l.map((s,i)=>`<div class="station-card" onclick="document.querySelectorAll('.station-card').forEach(c=>c.style.borderColor='');this.style.borderColor='var(--gold)'"><div style="display:flex;align-items:flex-start;gap:var(--space-sm)"><span class="material-symbols-outlined" style="color:var(--gold);font-size:20px;margin-top:2px">location_on</span><div style="flex:1"><strong style="font-size:.875rem">${s.name}</strong><p style="font-size:.75rem;color:var(--text-tertiary);margin:2px 0">${s.address}</p><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"><span class="chip" style="padding:2px 8px;font-size:.625rem">${s.type==='early'?'🟢 Early':'🔵 Election Day'}</span>${s.accessible?'<span class="chip" style="padding:2px 8px;font-size:.625rem">♿ Accessible</span>':''}<span class="chip" style="padding:2px 8px;font-size:.625rem">🕐 ${s.hours}</span></div></div></div><a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" rel="noopener" class="btn btn-tonal" style="margin-top:var(--space-sm);width:100%;justify-content:center;padding:8px;font-size:.75rem" onclick="event.stopPropagation()"><span class="material-symbols-outlined" style="font-size:14px">directions</span>Get Directions</a></div>`).join('');}
    function filterSt(t,b){document.querySelectorAll('.map-sidebar .chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');cf=t;const filtered = t==='all'?stations:t==='accessible'?stations.filter(s=>s.accessible):stations.filter(s=>s.type===t);renderSt(filtered);}
    function searchSt(q){const l=q.toLowerCase();const filtered = stations.filter(s=>(cf==='all'||s.type===cf||(cf==='accessible'&&s.accessible))&&(s.name.toLowerCase().includes(l)||s.area.toLowerCase().includes(l)));renderSt(filtered);}
    renderSt(stations);

    let map;
    function initMap() {
      map = L.map('map', { preferCanvas: true }).setView([20.5937, 78.9629], 5);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      setupMassiveMap(map, stations);
    }

    document.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
