<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Polling Stations — ElectBot</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/material.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/config.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=${CONFIG.GA4_MEASUREMENT_ID}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    if (typeof CONFIG !== "undefined" && CONFIG.GA4_MEASUREMENT_ID && CONFIG.GA4_MEASUREMENT_ID !== "G-XXXXXXXXXX") {
      gtag("config", CONFIG.GA4_MEASUREMENT_ID);
    }
  </script>
</head>
<body>
  <div class="bg-gradient"></div>
  <nav class="navbar" id="navbar"><a href="index.html" class="nav-brand"><span class="material-symbols-outlined">how_to_vote</span>ElectBot</a><button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span class="material-symbols-outlined">menu</span></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="chat.html">AI Chat</a></li><li><a href="timeline.html">Timeline</a></li><li><a href="guide.html">Voter Guide</a></li><li><a href="quiz.html">Quiz</a></li><li><a href="news.html">News</a></li><li><a href="map.html" class="active">Find Polls</a></li><li><a href="plan.html">My Plan</a></li></ul><button class="theme-toggle" id="themeToggle" aria-label="Theme"><span class="material-symbols-outlined">auto_awesome</span></button></nav>
  <div class="map-layout">
    <div class="map-sidebar">
      <h2 style="font-size:1.25rem;margin-bottom:var(--space-sm);color:var(--gold)">Polling Stations</h2>
      <p style="font-size:.8125rem;color:var(--text-tertiary);margin-bottom:var(--space-lg)">Find your nearest polling station</p>
      <div style="display:flex;gap:var(--space-xs);flex-wrap:wrap;margin-bottom:var(--space-lg)">
        <button class="chip active" onclick="filterSt('all',this)">All</button>
        <button class="chip" onclick="filterSt('election_day',this)">Election Day</button>
        <button class="chip" onclick="filterSt('early',this)">Early Voting</button>
        <button class="chip" onclick="filterSt('accessible',this)">♿ Accessible</button>
      </div>
      <input type="text" class="input-field" placeholder="Search by area..." style="margin-bottom:var(--space-md)" oninput="searchSt(this.value)">
      <div id="stationList"></div>
      <div style="margin-top:var(--space-lg);padding:var(--space-md);background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.2);border-radius:var(--radius-md)"><p style="font-size:.75rem;color:var(--text-secondary);margin:0"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">info</span> Sample data for demonstration.</p></div>
    </div>
    <div id="map" class="map-container" style="background:var(--bg-mid);display:flex;align-items:center;justify-content:center;z-index:1">
      <!-- Leaflet map will render here -->
    </div>
  </div>
  <script src="js/animations.js"></script>
  <script>
    const baseCities = [
      {name:"Mumbai", lat:18.9322, lng:72.8264}, {name:"New Delhi", lat:28.6315, lng:77.2167},
      {name:"Bengaluru", lat:12.9763, lng:77.5929}, {name:"Chennai", lat:13.0827, lng:80.2707},
      {name:"Kolkata", lat:22.5280, lng:88.3659}, {name:"Ahmedabad", lat:23.0338, lng:72.5466},
      {name:"Hyderabad", lat:17.4156, lng:78.4347}, {name:"Pune", lat:18.5308, lng:73.8475},
      {name:"Jaipur", lat:26.8530, lng:75.8047}, {name:"Lucknow", lat:26.8467, lng:80.9462},
      {name:"Bhopal", lat:23.2599, lng:77.4126}, {name:"Patna", lat:25.5941, lng:85.1376},
      {name:"Chandigarh", lat:30.7333, lng:76.7794}, {name:"Guwahati", lat:26.1445, lng:91.7362},
      {name:"Bhubaneswar", lat:20.2961, lng:85.8245}, {name:"Kochi", lat:9.9312, lng:76.2673},
      {name:"Indore", lat:22.7196, lng:75.8577}, {name:"Nagpur", lat:21.1458, lng:79.0882},
      {name:"Surat", lat:21.1702, lng:72.8311}, {name:"Visakhapatnam", lat:17.6868, lng:83.2185},
      {name:"Srinagar", lat:34.0837, lng:74.7973}, {name:"Ranchi", lat:23.3441, lng:85.3096},
      {name:"Raipur", lat:21.2514, lng:81.6296}, {name:"Dehradun", lat:30.3165, lng:78.0322},
      {name:"Shimla", lat:31.1048, lng:77.1734}, {name:"Madurai", lat:9.9252, lng:78.1198},
      {name:"Varanasi", lat:25.3176, lng:82.9739}, {name:"Amritsar", lat:31.6340, lng:74.8723},
      {name:"Agra", lat:27.1767, lng:78.0081}, {name:"Coimbatore", lat:11.0168, lng:76.9558}
    ];

    const stations = [];
    
    // Procedurally generate 1500+ polling stations across India
    baseCities.forEach(city => {
      // Main city station
      stations.push({
        name: `HQ Polling Center - ${city.name}`,
        area: city.name,
        address: `Central District, ${city.name}`,
        hours: "7:00 AM – 6:00 PM",
        type: "election_day",
        accessible: true,
        lat: city.lat,
        lng: city.lng
      });

      // Generate 50 local booths clustered around the city (simulating villages/colonies)
      for(let i=0; i<50; i++) {
        // Random spread of about ~100km radius
        const latOffset = (Math.random() - 0.5) * 1.5;
        const lngOffset = (Math.random() - 0.5) * 1.5;
        
        stations.push({
          name: `Local Booth #${Math.floor(Math.random()*9000)+1000}`,
          area: `${city.name} Outskirts`,
          address: `Ward ${Math.floor(Math.random()*50)+1}, ${city.name} Region`,
          hours: "7:00 AM – 6:00 PM",
          type: Math.random() > 0.85 ? "early" : "election_day",
          accessible: Math.random() > 0.4,
          lat: city.lat + latOffset,
          lng: city.lng + lngOffset
        });
      }
    });

    let cf='all';
    // Max 50 items in sidebar for performance, but all 1500 on map
    function renderSt(l){const c=document.getElementById('stationList');if(!l.length){c.innerHTML='<p style="text-align:center;color:var(--text-tertiary);padding:var(--space-xl)">No stations found.</p>';return;}
    const displayList = l.slice(0, 50); // Only render top 50 in HTML list to prevent DOM lag
    c.innerHTML=displayList.map((s,i)=>`<div class="station-card" onclick="document.querySelectorAll('.station-card').forEach(c=>c.style.borderColor='');this.style.borderColor='var(--gold)'; map.setView([${s.lat}, ${s.lng}], 14)"><div style="display:flex;align-items:flex-start;gap:var(--space-sm)"><span class="material-symbols-outlined" style="color:var(--gold);font-size:20px;margin-top:2px">location_on</span><div style="flex:1"><strong style="font-size:.875rem">${s.name}</strong><p style="font-size:.75rem;color:var(--text-tertiary);margin:2px 0">${s.address}</p><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"><span class="chip" style="padding:2px 8px;font-size:.625rem">${s.type==='early'?'🟢 Early':'🔵 Election Day'}</span>${s.accessible?'<span class="chip" style="padding:2px 8px;font-size:.625rem">♿ Accessible</span>':''}<span class="chip" style="padding:2px 8px;font-size:.625rem">🕐 ${s.hours}</span></div></div></div><a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" rel="noopener" class="btn btn-tonal" style="margin-top:var(--space-sm);width:100%;justify-content:center;padding:8px;font-size:.75rem" onclick="event.stopPropagation()"><span class="material-symbols-outlined" style="font-size:14px">directions</span>Get Directions</a></div>`).join('');
    if(l.length > 50) c.innerHTML += `<p style="text-align:center;font-size:12px;color:var(--text-tertiary);margin-top:10px">+ ${l.length - 50} more stations. Use the map to explore.</p>`;
    }
    function filterSt(t,b){document.querySelectorAll('.map-sidebar .chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');cf=t;const filtered = t==='all'?stations:t==='accessible'?stations.filter(s=>s.accessible):stations.filter(s=>s.type===t);renderSt(filtered);updateMarkers(filtered);}
    function searchSt(q){const l=q.toLowerCase();const filtered = stations.filter(s=>(cf==='all'||s.type===cf||(cf==='accessible'&&s.accessible))&&(s.name.toLowerCase().includes(l)||s.area.toLowerCase().includes(l)));renderSt(filtered);updateMarkers(filtered);}
    renderSt(stations);

    // Leaflet Maps Integration (Free Alternative)
    let map;
    let markersLayer;

    function initMap() {
      // Center the map on India with a zoom level that shows the whole country
      map = L.map('map').setView([20.5937, 78.9629], 5);

      // Use CARTO Voyager tiles (clean, light map style)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
      updateMarkers(stations);
    }

    function updateMarkers(filteredStations) {
      if (!markersLayer) return;
      markersLayer.clearLayers();
      
      // Use L.circleMarker for high performance rendering of thousands of points
      filteredStations.forEach(s => {
        const color = s.type === 'early' ? '#4ade80' : '#4a9eff';
        
        const marker = L.circleMarker([s.lat, s.lng], {
          radius: 5,
          fillColor: color,
          color: '#ffffff',
          weight: 1,
          opacity: 1,
          fillOpacity: 0.8
        });

        marker.bindPopup(`<div style="color:#333;padding:5px;font-family:var(--font-sans)"><strong>${s.name}</strong><p style="margin:5px 0 0;font-size:12px">${s.address}</p></div>`);
        markersLayer.addLayer(marker);
      });
    }

    document.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
